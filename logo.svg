<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Cercles externes -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#C4A350" stroke-width="8"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="#C4A350" stroke-width="3"/>
  
  <!-- Lettre G -->
  <text x="50" y="130" font-size="90" font-weight="bold" font-family="Georgia, serif" fill="#C4A350">G</text>
  
  <!-- Épis de blé -->
  <g transform="translate(130, 80)">
    <!-- Tige -->
    <line x1="0" y1="0" x2="0" y2="50" stroke="#C4A350" stroke-width="2"/>
    
    <!-- Grains -->
    <ellipse cx="-8" cy="5" rx="6" ry="10" fill="#C4A350" transform="rotate(-30 -8 5)"/>
    <ellipse cx="8" cy="5" rx="6" ry="10" fill="#C4A350" transform="rotate(30 8 5)"/>
    
    <ellipse cx="-10" cy="18" rx="6" ry="10" fill="#C4A350" transform="rotate(-35 -10 18)"/>
    <ellipse cx="10" cy="18" rx="6" ry="10" fill="#C4A350" transform="rotate(35 10 18)"/>
    
    <ellipse cx="-9" cy="32" rx="6" ry="10" fill="#C4A350" transform="rotate(-30 -9 32)"/>
    <ellipse cx="9" cy="32" rx="6" ry="10" fill="#C4A350" transform="rotate(30 9 32)"/>
    
    <ellipse cx="-7" cy="45" rx="5" ry="8" fill="#C4A350" transform="rotate(-25 -7 45)"/>
    <ellipse cx="7" cy="45" rx="5" ry="8" fill="#C4A350" transform="rotate(25 7 45)"/>
  </g>
</svg>